name: Release

# Tag a release with:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # PyPI trusted publishing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check src tests
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag matches project version
        run: |
          VERSION=$(python3 -c "import re;print(re.search(r'^version = \"([^\"]+)\"', open('pyproject.toml').read(), re.M).group(1))")
          [ "v$VERSION" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != version $VERSION"; exit 1; }
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build
      - name: Build Debian package
        run: scripts/build-deb.sh dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "WinClip $GITHUB_REF_NAME" \
            --generate-notes

  pypi:
    # Publishes when the repository variable PUBLISH_PYPI is "true".
    # Uses PyPI trusted publishing (no token needed): add this repo +
    # workflow as a trusted publisher for the "winclip" project on
    # pypi.org first. See docs/PACKAGING.md.
    if: vars.PUBLISH_PYPI == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Remove non-PyPI artifacts
        run: rm -f dist/*.deb
      - uses: pypa/gh-action-pypi-publish@release/v1
